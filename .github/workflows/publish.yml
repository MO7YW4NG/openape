name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish-platform:
    name: ${{ matrix.node_pkg }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            node_os: linux
            node_arch: x64
            node_pkg: openape-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            node_os: linux
            node_arch: arm64
            node_pkg: openape-linux-arm64
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            node_os: darwin
            node_arch: x64
            node_pkg: openape-darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            node_os: darwin
            node_arch: arm64
            node_pkg: openape-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            node_os: win32
            node_arch: x64
            node_pkg: openape-win32-x64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            node_os: win32
            node_arch: arm64
            node_pkg: openape-win32-arm64

    steps:
      - uses: actions/checkout@v6

      - name: Get version from release tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for ARM Linux)
        if: matrix.use_cross
        run: cargo install cross

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Build (cargo)
        if: "!matrix.use_cross"
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Prepare platform package
        shell: bash
        env:
          node_pkg: ${{ matrix.node_pkg }}
          node_version: ${{ steps.version.outputs.version }}
          node_os: ${{ matrix.node_os }}
          node_arch: ${{ matrix.node_arch }}
        run: |
          mkdir -p "npm/${{ matrix.node_pkg }}/bin/skills/openape"
          node -e "
            const fs = require('fs');
            const replace = (path, out) => {
              let content = fs.readFileSync(path, 'utf8');
              content = content.replace(/\$\{node_pkg\}/g, process.env.node_pkg)
                               .replace(/\$\{node_version\}/g, process.env.node_version)
                               .replace(/\$\{node_os\}/g, process.env.node_os)
                               .replace(/\$\{node_arch\}/g, process.env.node_arch);
              fs.writeFileSync(out, content);
            };
            replace('npm/package.json.tmpl', 'npm/${{ matrix.node_pkg }}/package.json');
            replace('npm/jsr.json.tmpl', 'npm/${{ matrix.node_pkg }}/jsr.json');
            // Create a dummy JS file for JSR satisfaction
            fs.writeFileSync('npm/${{ matrix.node_pkg }}/bin/mod.js', 'export const version = \"' + process.env.node_version + '\";\n');
          "
          cp skills/openape/SKILL.md "npm/${{ matrix.node_pkg }}/bin/skills/openape/SKILL.md"
          if [[ "${{ matrix.node_os }}" == "win32" ]]; then
            cp "target/${{ matrix.target }}/release/openape.exe" "npm/${{ matrix.node_pkg }}/bin/openape.exe"
          else
            cp "target/${{ matrix.target }}/release/openape" "npm/${{ matrix.node_pkg }}/bin/openape"
            chmod +x "npm/${{ matrix.node_pkg }}/bin/openape"
          fi

      - name: Publish platform package to npm
        working-directory: npm/${{ matrix.node_pkg }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish platform package to JSR
        working-directory: npm/${{ matrix.node_pkg }}
        run: npx jsr publish --allow-dirty
        continue-on-error: true

  publish-base:
    name: Publish base npm package
    runs-on: ubuntu-latest
    needs: build-and-publish-platform

    steps:
      - uses: actions/checkout@v6

      - name: Get version from release tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Update version in package.json
        working-directory: npm/app
        env:
          node_version: ${{ steps.version.outputs.version }}
        run: |
          node -e "
            const fs = require('fs');
            const version = process.env.node_version;
            
            // Update package.json
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = version;
            if (pkg.optionalDependencies) {
              for (const dep in pkg.optionalDependencies) {
                if (dep.startsWith('@mo7yw4ng/openape-')) {
                  pkg.optionalDependencies[dep] = version;
                }
              }
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            
            // Update jsr.json
            const jsr = JSON.parse(fs.readFileSync('jsr.json', 'utf8'));
            jsr.version = version;
            fs.writeFileSync('jsr.json', JSON.stringify(jsr, null, 2) + '\n');
          "

      - name: Install dependencies & build
        working-directory: npm/app
        run: |
          npm install
          npm run build

      - name: Publish to npm
        working-directory: npm/app
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to JSR
        working-directory: npm/app
        run: npx jsr publish --allow-dirty
        continue-on-error: true
