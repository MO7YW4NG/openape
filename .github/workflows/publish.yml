name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-and-publish-platform:
    name: ${{ matrix.node_pkg }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            node_os: linux
            node_arch: x64
            node_pkg: openape-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            node_os: linux
            node_arch: arm64
            node_pkg: openape-linux-arm64
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            node_os: darwin
            node_arch: x64
            node_pkg: openape-darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            node_os: darwin
            node_arch: arm64
            node_pkg: openape-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            node_os: win32
            node_arch: x64
            node_pkg: openape-win32-x64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            node_os: win32
            node_arch: arm64
            node_pkg: openape-win32-arm64

    steps:
      - uses: actions/checkout@v6

      - name: Get version from release tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Check if already published
        id: check
        shell: bash
        run: |
          if npm view @mo7yw4ng/${{ matrix.node_pkg }}@${{ steps.version.outputs.version }} version >/dev/null 2>&1; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Rust toolchain
        if: steps.check.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for ARM Linux)
        if: steps.check.outputs.skip != 'true' && matrix.use_cross
        run: cargo install cross

      - name: Cache cargo
        if: steps.check.outputs.skip != 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (cross)
        if: steps.check.outputs.skip != 'true' && matrix.use_cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Build (cargo)
        if: steps.check.outputs.skip != 'true' && !matrix.use_cross
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Setup Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Prepare platform package
        if: steps.check.outputs.skip != 'true'
        shell: bash
        env:
          node_pkg: ${{ matrix.node_pkg }}
          node_version: ${{ steps.version.outputs.version }}
          node_os: ${{ matrix.node_os }}
          node_arch: ${{ matrix.node_arch }}
        run: |
          mkdir -p "npm/${{ matrix.node_pkg }}/bin/skills/openape"
          envsubst < npm/package.json.tmpl > "npm/${{ matrix.node_pkg }}/package.json"
          echo "export const version: string = \"${node_version}\";" > "npm/${{ matrix.node_pkg }}/bin/mod.ts"
          cp skills/openape/SKILL.md "npm/${{ matrix.node_pkg }}/bin/skills/openape/SKILL.md"
          cp README.md "npm/${{ matrix.node_pkg }}/README.md"
          cp LICENSE "npm/${{ matrix.node_pkg }}/LICENSE"
          if [[ "${{ matrix.node_os }}" == "win32" ]]; then
            cp "target/${{ matrix.target }}/release/openape.exe" "npm/${{ matrix.node_pkg }}/bin/openape.exe"
          else
            cp "target/${{ matrix.target }}/release/openape" "npm/${{ matrix.node_pkg }}/bin/openape"
            chmod +x "npm/${{ matrix.node_pkg }}/bin/openape"
          fi

      - name: Publish platform package to npm
        if: steps.check.outputs.skip != 'true'
        working-directory: npm/${{ matrix.node_pkg }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Prepare binary for release
        if: steps.check.outputs.skip != 'true'
        shell: bash
        run: |
          mkdir -p release
          if [[ "${{ matrix.node_os }}" == "win32" ]]; then
            cp "target/${{ matrix.target }}/release/openape.exe" "release/openape-${{ matrix.node_os }}-${{ matrix.node_arch }}.exe"
            # Generate SHA256 checksum
            cd release && sha256sum "openape-${{ matrix.node_os }}-${{ matrix.node_arch }}.exe" > "openape-${{ matrix.node_os }}-${{ matrix.node_arch }}.exe.sha256" && cd ..
          else
            cp "target/${{ matrix.target }}/release/openape" "release/openape-${{ matrix.node_os }}-${{ matrix.node_arch }}"
            chmod +x "release/openape-${{ matrix.node_os }}-${{ matrix.node_arch }}"
            # Generate SHA256 checksum
            cd release && sha256sum "openape-${{ matrix.node_os }}-${{ matrix.node_arch }}" > "openape-${{ matrix.node_os }}-${{ matrix.node_arch }}.sha256" && cd ..
          fi

      - name: Upload binary to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: release/*

  publish-base:
    name: Publish base npm package
    runs-on: ubuntu-latest
    needs: build-and-publish-platform

    steps:
      - uses: actions/checkout@v6

      - name: Get version from release tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Update version in package.json
        working-directory: npm/app
        run: |
          VERSION=${{ steps.version.outputs.version }}
          # Update version
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/g" package.json
          # Update optionalDependencies
          sed -i "s/\"@mo7yw4ng\/openape-\(.*\)\": \".*\"/\"@mo7yw4ng\/openape-\1\": \"$VERSION\"/g" package.json
          cp ../../README.md README.md
          cp ../../LICENSE LICENSE

      - name: Install dependencies & build
        working-directory: npm/app
        run: |
          npm install
          npm run build

      - name: Publish to npm
        working-directory: npm/app
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
