name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish-platform:
    name: ${{ matrix.node_pkg }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-20.04
            target: x86_64-unknown-linux-gnu
            node_os: linux
            node_arch: x64
            node_pkg: openape-linux-x64
          - os: ubuntu-20.04
            target: aarch64-unknown-linux-gnu
            node_os: linux
            node_arch: arm64
            node_pkg: openape-linux-arm64
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            node_os: darwin
            node_arch: x64
            node_pkg: openape-darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            node_os: darwin
            node_arch: arm64
            node_pkg: openape-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            node_os: win32
            node_arch: x64
            node_pkg: openape-win32-x64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            node_os: win32
            node_arch: arm64
            node_pkg: openape-win32-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Get version from release tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for ARM Linux)
        if: matrix.use_cross
        run: cargo install cross

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Build (cargo)
        if: "!matrix.use_cross"
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare platform package
        shell: bash
        env:
          node_pkg: ${{ matrix.node_pkg }}
          node_version: ${{ steps.version.outputs.version }}
          node_os: ${{ matrix.node_os }}
          node_arch: ${{ matrix.node_arch }}
        run: |
          mkdir -p "npm/${{ matrix.node_pkg }}/bin"
          mkdir -p "npm/${{ matrix.node_pkg }}/bin/skills/openape"
          envsubst < npm/package.json.tmpl > "npm/${{ matrix.node_pkg }}/package.json"
          envsubst < npm/jsr.json.tmpl > "npm/${{ matrix.node_pkg }}/jsr.json"
          cp skills/openape/SKILL.md "npm/${{ matrix.node_pkg }}/bin/skills/openape/SKILL.md"
          if [[ "${{ matrix.node_os }}" == "win32" ]]; then
            cp "target/${{ matrix.target }}/release/openape.exe" "npm/${{ matrix.node_pkg }}/bin/openape.exe"
          else
            cp "target/${{ matrix.target }}/release/openape" "npm/${{ matrix.node_pkg }}/bin/openape"
            chmod +x "npm/${{ matrix.node_pkg }}/bin/openape"
          fi

      - name: Publish platform package to npm
        working-directory: npm/${{ matrix.node_pkg }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish platform package to JSR
        working-directory: npm/${{ matrix.node_pkg }}
        run: npx jsr publish --allow-dirty
        continue-on-error: true

  publish-base:
    name: Publish base npm package
    runs-on: ubuntu-latest
    needs: build-and-publish-platform

    steps:
      - uses: actions/checkout@v4

      - name: Get version from release tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Update version in package.json
        working-directory: npm/app
        run: |
          VERSION=${{ steps.version.outputs.version }}
          npm version $VERSION --no-git-tag-version
          # Update jsr.json
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" jsr.json
          # Update platform dependencies in package.json
          sed -i "s/\"@mo7yw4ng\/openape-\(.*\)\": \".*\"/\"@mo7yw4ng\/openape-\1\": \"$VERSION\"/g" package.json

      - name: Install dependencies & build
        working-directory: npm/app
        run: |
          npm install
          npm run build

      - name: Publish to npm
        working-directory: npm/app
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to JSR
        working-directory: npm/app
        run: npx jsr publish --allow-dirty
        continue-on-error: true
