name: Publish to NPM

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Build npm package (DNT → build/)
        run: deno task build:npm

      - name: Verify CLI works in Node.js
        run: node build/esm/index.js --help

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: ./build
        run: npm publish --access public
